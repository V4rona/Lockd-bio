<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Lockd.bio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111111; --bg2: #161616; --bg3: #1c1c1c;
      --border: #202020; --border2: #2a2a2a;
      --text: #efefef; --text2: #888; --text3: #404040;
      --green: #a8d9b8; --green-dim: #172419;
      --green-border: rgba(168,217,184,0.18);
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-weight: 300;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; -webkit-font-smoothing: antialiased;
    }

    .container {
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      max-width: 400px;
      opacity: 0; transform: translateY(14px);
      animation: fadeUp .5s ease forwards .1s;
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--bg2); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
    }

    .code {
      font-size: 11px; color: var(--text3);
      letter-spacing: .12em; text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 32px; font-weight: 400;
      letter-spacing: -.02em; color: var(--text);
      margin-bottom: 12px; line-height: 1.1;
    }

    p {
      font-size: 14px; color: var(--text2);
      line-height: 1.7; margin-bottom: 32px;
      max-width: 300px;
    }

    .actions {
      display: flex; align-items: center;
      gap: 10px; flex-wrap: wrap; justify-content: center;
    }

    .btn-primary {
      background: var(--green); color: #111;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      padding: 11px 22px; border-radius: 8px;
      border: none; cursor: pointer;
      text-decoration: none; display: inline-block;
      transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .85; }

    .btn-ghost {
      background: transparent; color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 300;
      padding: 11px 18px; border-radius: 8px;
      border: 1px solid var(--border2);
      cursor: pointer; text-decoration: none;
      display: inline-block; transition: color .2s, border-color .2s;
    }
    .btn-ghost:hover { color: var(--text); border-color: #333; }

    .footer {
      margin-top: 56px;
      font-family: 'DM Serif Display', serif;
      font-size: 14px; color: var(--text3);
      text-decoration: none; transition: color .2s;
    }
    .footer span { color: var(--green); }
    .footer:hover { color: var(--text2); }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#404040" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>

    <p class="code">Error 404</p>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been removed. If you were looking for someone's profile, check the URL is correct.</p>

    <div class="actions">
      <a href="index.html" class="btn-primary">Go to home</a>
      <a href="register.html" class="btn-ghost">Create my profile</a>
    </div>
  </div>

  <a href="index.html" class="footer">Lockd<span>.bio</span></a>

</body>
</html>
